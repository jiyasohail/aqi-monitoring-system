name: Daily Training Pipeline

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC daily
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backfill (last 7 days delta)
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          HOPSWORKS_API_KEY:   ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT:   ${{ secrets.HOPSWORKS_PROJECT }}
        run: python -m pipelines.backfill --days 7

      - name: Train models
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          HOPSWORKS_API_KEY:   ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT:   ${{ secrets.HOPSWORKS_PROJECT }}
        run: python -m pipelines.train_pipeline

      - name: Generate 72h predictions
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          HOPSWORKS_API_KEY:   ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT:   ${{ secrets.HOPSWORKS_PROJECT }}
        run: python -m pipelines.predict

      - name: Commit updated models and predictions
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/ data/predictions.csv || true
          git diff --cached --quiet || git commit -m "chore: daily model retrain + predictions [skip ci]"
          git push || true
