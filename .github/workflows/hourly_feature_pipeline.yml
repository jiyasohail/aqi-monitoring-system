name: Hourly Feature Pipeline

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:        # allow manual runs

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run feature pipeline
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          HOPSWORKS_API_KEY:   ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT:   ${{ secrets.HOPSWORKS_PROJECT }}
        run: python -m pipelines.feature_pipeline

      - name: Commit updated live features CSV (if Hopsworks not configured)
        if: ${{ env.HOPSWORKS_API_KEY == '' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/features_live.csv || true
          git diff --cached --quiet || git commit -m "chore: hourly feature update [skip ci]"
          git push || true
